<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Job Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  
  <header>
    <div class="navbar">
      <a href="/index.html" class="logo-container">
        <div class="logo-icon">J</div>
        <span class="logo-text">Job Portal</span>
      </a>
      <ul class="nav-links" id="navbar-links">
        <li><a href="/index.html" class="nav-link">Home</a></li>
        <li><a href="/jobs.html" class="nav-link">Browse Jobs</a></li>
        <li><a href="/login.html" class="nav-btn-secondary">Login</a></li>
        <li><a href="/register.html" class="nav-btn">Register</a></li>
      </ul>
    </div>
  </header>

  <main>
    <div class="form-container">
      <div class="glass-card">
        <h2 class="form-title">Reset Password</h2>
        <p class="form-subtitle">Choose a new, secure password for your account.</p>
        
        <form id="reset-password-form">
          <!-- New Password -->
          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <div style="position: relative;">
              <input type="password" id="new-password" class="form-control" placeholder="••••••••" required minlength="6" style="padding-right: 2.5rem; width: 100%;">
              <button type="button" class="toggle-password-btn" data-target="new-password" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.6); padding: 0.2rem; font-size: 1.1rem; display: flex; align-items: center; outline: none; transition: color 0.2s;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 1.25rem; height: 1.25rem;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm New Password -->
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <div style="position: relative;">
              <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required minlength="6" style="padding-right: 2.5rem; width: 100%;">
              <button type="button" class="toggle-password-btn" data-target="confirm-password" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.6); padding: 0.2rem; font-size: 1.1rem; display: flex; align-items: center; outline: none; transition: color 0.2s;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width: 1.25rem; height: 1.25rem;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Error / Success Message Display -->
          <div id="error-message" style="color: var(--accent-color); font-size: 0.85rem; margin-bottom: 1rem; display: none; font-weight: 600;"></div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Update Password</button>
        </form>

        <div class="form-footer">
          Back to <a href="/login.html">Sign In</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <a href="/index.html" class="logo-container">
        <div class="logo-icon">J</div>
        <span class="logo-text">Job Portal</span>
      </a>
      <p class="footer-copy">&copy; 2026 Job Portal Designed by vikram</p>
    </div>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <!-- Shared Scripts -->
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const form = document.getElementById('reset-password-form');
      const errEl = document.getElementById('error-message');

      if (!token) {
        showToast('Invalid or missing reset token', 'error');
        errEl.innerText = 'Error: No valid password reset token found in URL.';
        errEl.style.display = 'block';
        form.querySelector('button').disabled = true;
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        errEl.style.display = 'none';

        if (password !== confirmPassword) {
          errEl.innerText = 'Passwords do not match';
          errEl.style.display = 'block';
          return;
        }

        try {
          const res = await fetch(`/api/auth/resetpassword/${token}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            showToast('Password updated successfully!');
            setTimeout(() => {
              window.location.href = '/login.html';
            }, 1500);
          } else {
            showToast(data.message || 'Reset failed', 'error');
            errEl.innerText = data.message || 'Reset failed';
            errEl.style.display = 'block';
          }
        } catch (err) {
          console.error(err);
          showToast('Server connection failed', 'error');
          errEl.innerText = 'Server connection failed';
          errEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
