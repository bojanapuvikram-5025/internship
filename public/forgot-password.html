<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Job Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  
  <header>
    <div class="navbar">
      <a href="/index.html" class="logo-container">
        <div class="logo-icon">J</div>
        <span class="logo-text">Job Portal</span>
      </a>
      <ul class="nav-links" id="navbar-links">
        <li><a href="/index.html" class="nav-link">Home</a></li>
        <li><a href="/jobs.html" class="nav-link">Browse Jobs</a></li>
        <li><a href="/login.html" class="nav-btn-secondary">Login</a></li>
        <li><a href="/register.html" class="nav-btn">Register</a></li>
      </ul>
    </div>
  </header>

  <main>
    <div class="form-container">
      <div class="glass-card">
        <h2 class="form-title">Forgot Password</h2>
        <p class="form-subtitle">Enter your registered email address below, and we will generate a secure reset link.</p>
        
        <form id="forgot-password-form">
          <!-- Email Address -->
          <div class="form-group">
            <label class="form-label" for="reset-email">Email Address</label>
            <input type="email" id="reset-email" class="form-control" placeholder="jane@example.com" required>
          </div>

          <!-- Error / Info Message Display -->
          <div id="info-message" style="display: none; font-size: 0.85rem; margin-bottom: 1.2rem; font-weight: 600; line-height: 1.4;"></div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Reset Link</button>
        </form>

        <a id="reset-now-btn" href="#" class="btn" style="display: none; margin-top: 1rem; width: 100%; text-align: center; text-decoration: none; background: #48bb78; color: white; font-weight: 600; border: none; border-radius: 8px; padding: 0.75rem; box-shadow: 0 4px 14px rgba(72, 187, 120, 0.4); transition: transform 0.2s;">Reset Password Now</a>

        <div class="form-footer">
          Remember your password? <a href="/login.html">Sign In</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <a href="/index.html" class="logo-container">
        <div class="logo-icon">J</div>
        <span class="logo-text">Job Portal</span>
      </a>
      <p class="footer-copy">&copy; 2026 Job Portal Designed by vikram</p>
    </div>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <!-- Shared Scripts -->
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('forgot-password-form');
      const messageEl = document.getElementById('info-message');
      const resetBtn = document.getElementById('reset-now-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value;

        messageEl.style.display = 'none';
        resetBtn.style.display = 'none';

        try {
          const res = await fetch('/api/auth/forgotpassword', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            showToast('Reset request processed successfully!');
            messageEl.innerText = 'A password reset link has been successfully generated for your account.';
            messageEl.style.color = '#48bb78';
            messageEl.style.display = 'block';

            if (data.resetUrl) {
              resetBtn.href = data.resetUrl;
              resetBtn.style.display = 'block';
            }
          } else {
            showToast(data.message || 'Failed to process request', 'error');
            messageEl.innerText = data.message || 'Failed to process request';
            messageEl.style.color = 'var(--accent-color)';
            messageEl.style.display = 'block';
          }
        } catch (err) {
          console.error(err);
          showToast('Server connection failed', 'error');
          messageEl.innerText = 'Server connection failed';
          messageEl.style.color = 'var(--accent-color)';
          messageEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
